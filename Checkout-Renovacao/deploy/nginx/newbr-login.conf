server {
    server_name api.prod.hakione.tech;

    root /var/www/newbr-login;
    index index.html;

    location /api/local/newbr/ {
        proxy_pass http://127.0.0.1:8091/api/local/newbr/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/webhooks/mercadopago/ {
        proxy_pass http://127.0.0.1:8091/api/webhooks/mercadopago/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.prod.hakione.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prod.hakione.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name api.prod.hakione.tech;

    return 301 https://$host$request_uri;
}
