# Include dentro do server HTTPS existente de MaisTV.
# O certificado e o redirect HTTP -> HTTPS continuam sob responsabilidade do vhost principal.

location = /api/events {
    proxy_pass http://127.0.0.1:5055;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    send_timeout 1h;

    gzip off;
    add_header X-Accel-Buffering no always;
    add_header Cache-Control "no-cache, no-transform" always;
}

# Health do processo SSE, para uso interno e Uptime Kuma.
location = /api/health/realtime {
    proxy_pass http://127.0.0.1:5055;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
}

# Rotas REST da nova camada, delegadas pelo local-api somente quando
# CHAT_ARCHITECTURE_ENABLED=true. As rotas /api/whatsapp/* continuam no legado.
location ~ ^/api/(conversations(?:/|$)|messages/send$|media/|webhooks/meta$|health/(?:postgres|redis|queues)$) {
    proxy_pass http://127.0.0.1:5053;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /admin/queues {
    proxy_pass http://127.0.0.1:5053;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
