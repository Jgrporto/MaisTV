# Incluir SOMENTE dentro do server HTTPS de api.maistv.hakione.tech durante o cutover.
# As demais rotas continuam apontando para a SaasTV enquanto este snippet estiver ativo.

location = /api/whatsapp/webhook {
    proxy_pass http://127.0.0.1:5350;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}

